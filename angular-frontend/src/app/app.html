@if (isLoggedIn()) {
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/klijenti">
        <i class="bi bi-scissors text-primary fs-3"></i>
        <span class="fw-bold text-uppercase tracking-wider">Atelier Bella</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item">
            <a class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded" routerLink="/klijenti" routerLinkActive="active bg-primary text-white">
              <i class="bi bi-people-fill"></i> Klijenti
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded" routerLink="/narudzbine" routerLinkActive="active bg-primary text-white">
              <i class="bi bi-cart-fill"></i> Narudžbine
            </a>
          </li>
          <li class="nav-item">
            <span class="badge bg-secondary text-uppercase">
              @if (isAdmin()) {
                Admin
              } @else {
                Krojač
              }
            </span>
          </li>
          <li class="nav-item">
            <button type="button" class="btn btn-outline-light btn-sm" (click)="odjaviSe()">
              <i class="bi bi-box-arrow-right"></i> Odjava
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-4 bg-light min-vh-100">
    <div class="container">
      <router-outlet></router-outlet>
    </div>
  </main>
} @else {
  <router-outlet></router-outlet>
}
